<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Geriatric Front Door Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#333;overflow-x:hidden}
.top-bar{background:linear-gradient(135deg,#1a6b9a,#0d4f74);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.top-bar h1{font-size:1rem;font-weight:700}
.top-bar .sub{font-size:.72rem;opacity:.85}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a6b9a;display:flex;z-index:200;box-shadow:0 -2px 10px rgba(0,0,0,.2)}
.nav-btn{flex:1;padding:8px 4px 6px;background:none;border:none;color:rgba(255,255,255,.65);font-size:.62rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s}
.nav-btn .ic{font-size:1.25rem}
.nav-btn.active{color:#fff;background:rgba(255,255,255,.18)}
.page{display:none;padding:12px 12px 85px;min-height:calc(100vh - 52px)}
.page.active{display:block}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.card h2{font-size:.95rem;color:#1a6b9a;margin-bottom:10px;border-bottom:2px solid #e8f0f7;padding-bottom:6px}

/* DRUG TABLE */
.cat-btn{display:flex;width:100%;background:linear-gradient(135deg,#1a6b9a,#0d4f74);color:#fff;border:none;border-radius:8px;padding:12px 16px;margin-bottom:8px;text-align:left;font-size:.88rem;font-weight:600;cursor:pointer;justify-content:space-between;align-items:center;transition:opacity .2s}
.cat-btn:hover{opacity:.88}
.cat-content{display:none;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cat-content.open{display:block}
.drug-table{width:100%;border-collapse:collapse;font-size:.77rem;min-width:340px}
.drug-table th{background:#e8f0f7;color:#1a6b9a;padding:8px 7px;text-align:left;font-weight:700;border-bottom:2px solid #c0d4e8;white-space:nowrap}
.drug-table td{padding:7px;border-bottom:1px solid #eee;vertical-align:middle}
.drug-table tr:hover td{background:#f5f9ff}
.drug-table th:nth-child(3),
.drug-table td:nth-child(3){text-align:center;width:68px}
.img-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.img-wrap img{width:52px;height:52px;border-radius:6px;object-fit:cover;border:1px solid #ddd}
.img-ph{width:52px;height:52px;border-radius:6px;background:#e8f0f7;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:2px dashed #aac4df;cursor:pointer}
.img-lbl{font-size:.62rem;color:#1a6b9a;cursor:pointer;text-decoration:underline;background:none;border:none;padding:0}

/* CONTACTS */
.search-bar{width:100%;padding:9px 14px;border:1px solid #c0d4e8;border-radius:20px;font-size:.84rem;margin-bottom:12px;outline:none;background:#f5f9ff}
.contact-item{background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #1a6b9a;display:flex;justify-content:space-between;align-items:flex-start}
.contact-item .nm{font-weight:700;font-size:.88rem}
.contact-item .rl{font-size:.76rem;color:#666}
.contact-item .ph{font-size:.8rem;color:#1a6b9a;margin-top:2px}
.c-acts{display:flex;gap:5px;flex-shrink:0}
.c-acts button{background:none;border:1px solid #c0d4e8;border-radius:6px;padding:3px 8px;font-size:.7rem;cursor:pointer;color:#555}
.c-acts .del{color:#c0392b;border-color:#f1a9a0}

/* FAB */
.fab{position:fixed;bottom:72px;right:18px;width:52px;height:52px;border-radius:50%;background:#1a6b9a;color:#fff;border:none;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 14px rgba(26,107,154,.4);z-index:150;display:none;align-items:center;justify-content:center;transition:transform .2s}
.fab:hover{transform:scale(1.1)}
.fab.show{display:flex}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.mbox{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.mbox h3{color:#1a6b9a;margin-bottom:14px;font-size:1rem}
.mbox input,.mbox select,.mbox textarea{width:100%;padding:9px 12px;border:1px solid #c0d4e8;border-radius:8px;font-size:.84rem;margin-bottom:10px;outline:none}
.mbox textarea{min-height:70px;resize:vertical}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.mbtns button{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:.84rem;font-weight:600}
.bp{background:#1a6b9a;color:#fff}
.bc{background:#eee;color:#555}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.cal-lbl{text-align:center;font-size:.68rem;font-weight:700;color:#888;padding:4px 0}
.cal-day{text-align:center;padding:6px 2px;border-radius:7px;font-size:.76rem;cursor:pointer;min-height:32px;background:#f5f9ff;border:1px solid transparent;transition:all .15s}
.cal-day:hover{background:#d6e8f5}
.cal-day.today{background:#1a6b9a;color:#fff;font-weight:700}
.cal-day.has-event{border-color:#e67e22}
.cal-day.has-event::after{content:'•';display:block;color:#e67e22;font-size:.78rem;line-height:1}
.cal-day.other{opacity:.3}
.rem-list{list-style:none}
.rem-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f5f9ff;border-radius:8px;margin-bottom:5px;font-size:.8rem}
.rem-del{background:none;border:none;cursor:pointer;color:#c0392b;font-size:1rem}

/* GAIT */
.gait-tbl{width:100%;border-collapse:collapse;font-size:.77rem}
.gait-tbl th{background:#e8f0f7;padding:7px 6px;text-align:left;color:#1a6b9a;font-size:.77rem}
.gait-tbl td{padding:7px 6px;border-bottom:1px solid #eee;vertical-align:top}
.gait-tbl tr:hover td{background:#f5f9ff}

/* PROTOCOL */
.proto-btn{width:100%;background:#f5f9ff;border:1px solid #c0d4e8;border-radius:8px;padding:11px 14px;margin-bottom:6px;text-align:left;font-size:.84rem;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;color:#1a6b9a;transition:all .2s}
.proto-btn:hover{background:#dbeaf7}
.proto-body{display:none;background:#fff;border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:.8rem;line-height:1.65;border:1px solid #e0ecf5}
.proto-body.open{display:block}
.proto-body ul{padding-left:18px}
.proto-body li{margin-bottom:4px}

/* QR */
.qr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.qr-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 6px rgba(0,0,0,.08);text-align:center;font-size:.78rem}
.qr-box{width:80px;height:80px;background:#e8f0f7;border:2px dashed #aac4df;border-radius:8px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;cursor:pointer}
.qr-lbl{font-weight:700;color:#1a6b9a;margin-bottom:2px}

/* STATS */
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.stat-chip{flex:1;min-width:90px;background:linear-gradient(135deg,#1a6b9a,#0d4f74);color:#fff;border-radius:10px;padding:12px 10px;text-align:center}
.stat-chip .sv{font-size:1.4rem;font-weight:700}
.stat-chip .sl{font-size:.68rem;opacity:.85;margin-top:2px}

/* DUTY */
.duty-tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.duty-tbl th{background:#e8f0f7;padding:7px;text-align:left;font-size:.77rem}
.duty-tbl td{padding:7px;border-bottom:1px solid #eee}
.duty-tbl input{width:100%;border:none;background:transparent;font-size:.8rem;outline:none}

@media(min-width:600px){
  .page{max-width:700px;margin:0 auto}
  .qr-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:900px){
  .page{max-width:960px}
  .qr-grid{grid-template-columns:repeat(4,1fr)}
  .bottom-nav .nav-btn .ic{font-size:1.4rem}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div>
    <div class="sub">AED Geriatric Screening</div>
    <h1>🏥 Geriatric Front Door Tool</h1>
  </div>
  <div id="topDate" style="font-size:.72rem;text-align:right;opacity:.85"></div>
</div>

<!-- PAGES -->
<div id="pg-dashboard" class="page active">
  <div class="card">
    <h2>📊 Today's Overview</h2>
    <div class="stats-row">
      <div class="stat-chip"><div class="sv" id="statScreened">0</div><div class="sl">Screened Today</div></div>

    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">

    </div>
  </div>

    <h2>📅 Calendar</h2>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
